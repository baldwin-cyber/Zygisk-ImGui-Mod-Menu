name: AYTEAMHACK BUILDER
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AYTEAMHACK-MOD
          path: module/build/outputs/apk/release/*.apk
      - name: Upload SO Library
        uses: actions/upload-artifact@v3
        with:
          name: AYTEAMHACK-LIB
          path: module/build/intermediates/cmake/release/obj/arm64-v8a/*.so
          
